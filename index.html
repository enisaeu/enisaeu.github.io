<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Company Name</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Simple landing page description here.">
  
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4f46e5, #9333ea);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 20px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: white;
      color: #4f46e5;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      transition: 0.3s ease;
    }

    .btn:hover {
      background: #e5e7eb;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.9rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to Your Site</h1>
    <p>
      This is a simple landing page hosted on GitHub Pages.
      You can customize this text to describe your service or product.
    </p>
    <a href="#contact" class="btn">Get Started</a>

    <footer>
      © 2026 Your Company Name
    </footer>
  </div>
</body>
</html>
